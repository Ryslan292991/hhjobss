name: Поиск вакансий

on:
  schedule:
    # Каждые 3 часа. Время UTC, GitHub может запустить с задержкой в 5-15 минут.
    - cron: "0 */3 * * *"
  # Кнопка «Run workflow» во вкладке Actions — запустить прямо сейчас.
  workflow_dispatch:

# Нужно, чтобы workflow мог закоммитить обновлённый seen.json обратно.
permissions:
  contents: write

# Не запускать два прогона одновременно.
concurrency:
  group: job-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Искать вакансии
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HH_USER_AGENT: ${{ secrets.HH_USER_AGENT }}
          HH_TOKEN: ${{ secrets.HH_TOKEN }}
        run: python run.py

      - name: Запомнить показанные вакансии
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "seen: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
